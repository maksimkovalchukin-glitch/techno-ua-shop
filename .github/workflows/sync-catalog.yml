name: Sync Catalog

on:
  schedule:
    - cron: '0 6 * * *'   # щодня о 6:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build catalog data
        env:
          FEED_URL: https://api.dropshipping.ua/api/feeds/3537.xml
        run: python build.py

      - name: Commit & push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: sync catalog data $(date -u '+%Y-%m-%d')"
          git push
